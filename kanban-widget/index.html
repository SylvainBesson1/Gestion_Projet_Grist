<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Tâches</title>
    <!-- Chargement de WidgetSDK localement -->
    <script src="widgetSDK/min/widgetSDK.umd.js"></script>
    <link rel="stylesheet" href="widgetSDK/widgetSDK.css">
    <!-- Chargement de votre script -->
    <script src="main.js" defer></script>
    <style>
        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <!-- Conteneurs pour le widget et la configuration -->
    <div id="main-view"></div>
    <div id="config-view"></div>
    <div id="kanbanContainer"></div>
    <div id="toastContainer"></div>
    <div id="taskModal" class="modal"></div>
    <div id="loadingOverlay">
        <div>Chargement en cours...</div>
    </div>
</body>
</html>
